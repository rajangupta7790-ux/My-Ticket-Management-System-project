{% extends "base.html" %}

{% block title %}Passenger Details - Railway Booking{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Passenger Details</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% for i in range(pax_count) %}
                        <div class="card mb-3">
                            <div class="card-header">
                                <h6 class="mb-0">Passenger {{ i + 1 }}</h6>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-5 mb-3">
                                        <label for="name_{{ i }}" class="form-label">Name</label>
                                        <input type="text" class="form-control" id="name_{{ i }}" name="name_{{ i }}" required>
                                    </div>
                                    
                                    <div class="col-md-3 mb-3">
                                        <label for="age_{{ i }}" class="form-label">Age</label>
                                        <input type="number" class="form-control" id="age_{{ i }}" name="age_{{ i }}" min="1" max="120" required>
                                    </div>
                                    
                                    <div class="col-md-4 mb-3">
                                        <label for="gender_{{ i }}" class="form-label">Gender</label>
                                        <select class="form-select" id="gender_{{ i }}" name="gender_{{ i }}" required>
                                            <option value="">Select Gender</option>
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                            <option value="Other">Other</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    {% endfor %}
                    
                    <div class="d-flex justify-content-between">
                        <a href="/search" class="btn btn-secondary">Back</a>
                        <button type="submit" class="btn btn-primary">Confirm Booking</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
